# 本地测试 & 服务器部署统一编排（§7.1）。
# Phase 1 已实现：backend / postgres / redis / qdrant / minio / nginx。
# frontend、worker(Celery) 在后续阶段补全，先注释占位以保证 compose 可直接拉起。

services:
  backend:
    build: ./backend
    env_file: .env
    volumes:
      - ./backend/data:/app/data
      - ./frontend:/frontend:ro
      - storage_data:/app/storage
    depends_on:
      - postgres
      - redis
      - qdrant
    ports:
      - "${BACKEND_HOST_PORT:-8000}:8000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-compliance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
      POSTGRES_DB: ${POSTGRES_DB:-compliance}
    volumes:
      - pg_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${NGINX_HOST_PORT:-80}:80"
    depends_on:
      - backend
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker -l info --concurrency=4
    env_file: .env
    environment:
      CELERY_EAGER: "false"   # 生产由 worker 进程异步消费
    volumes:
      - ./backend/data:/app/data
      - storage_data:/app/storage
    depends_on:
      - postgres
      - redis
      - qdrant
    restart: unless-stopped

  # frontend:              # Phase 2+：Next.js 前端（当前用后端内嵌静态页）
  #   build: ./frontend
  #   ports: ["3000:3000"]

volumes:
  pg_data:
  qdrant_data:
  minio_data:
  storage_data:
